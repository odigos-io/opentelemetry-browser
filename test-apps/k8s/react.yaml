apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app
  namespace: test-apps
  labels:
    app: react-app
    browser-otel-test: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: react-app
  template:
    metadata:
      labels:
        app: react-app
        browser-otel-test: "true"
    spec:
      containers:
        - name: react-app
          image: browser-otel-react:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: react-app
  namespace: test-apps
  labels:
    app: react-app
spec:
  selector:
    app: react-app
  ports:
    - name: http
      port: 80
      targetPort: 80
