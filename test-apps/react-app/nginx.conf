server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Same-origin proxy to the standalone backend. Because this is same-origin, the browser
    # OpenTelemetry SDK propagates trace context (traceparent) on the /api/chain fetch, so the
    # trace continues into backend-1 (which then calls backend-2). The trailing slash strips the
    # /api/ prefix: /api/chain -> backend-1 /chain.
    location /api/ {
        proxy_pass http://backend-1.test-apps.svc.cluster.local:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback so client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
